# Backend Locking Proxy Configuration
# Example configuration showing all features

server:
  host: 0.0.0.0
  port: 4001

# Define backends with their paths and lock dependencies
backends:
  # LLM backend - handles chat/completions
  llm:
    url: http://localhost:8080
    paths:
      - /v1/chat/completions
      - /v1/completions
      - /v1/models
      - /v1/models/*
    # Lock vision and embed while processing LLM requests
    locks:
      - vision
      - embed

  # Vision backend - handles image analysis
  vision:
    url: http://localhost:8081
    paths:
      - /v1/vision/*
    # No locks - vision doesn't lock other backends
    locks: []

  # Embeddings backend - handles vector embeddings
  embed:
    url: http://localhost:8082
    paths:
      - /v1/embeddings
    # Lock LLM while processing embeddings
    locks:
      - llm

# Global lock settings
global_lock:
  # Enable global locking (set to false to disable)
  enabled: true
  # Lock timeout in seconds (used for waiting)
  timeout: 300
