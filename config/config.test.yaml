# Test configuration for llmproxy
# Minimal setup for running tests

server:
  host: "127.0.0.1"
  port: 4002

backends:
  llm:
    url: "http://127.0.0.1:8080"
    locks:
      - embed
      - rerank
      
  embed:
    url: "http://127.0.0.1:8081"
    locks:
      - llm
      - rerank
      
  rerank:
    url: "http://127.0.0.1:8082"
    locks:
      - llm
      - embed

# Lock configuration
lock:
  enabled: true
  locked_error: false
