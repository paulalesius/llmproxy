# Global lock configuration for llmproxy
# Set LLMPROXY_CONFIG env var to use a different config file
#
# This is the main configuration file for LLMProxy.
# Currently contains global_lock settings, but can be extended with other configuration.
# Backend-based locking: each backend has one shared lock.
# When an endpoint runs, all backends in its 'locks' list are locked.
#
# Available backends:
#   - llm: /v1/chat/completions, /v1/completions, /v1/models, /v1/models/{id}
#   - embeddings: /v1/embeddings
#   - reranker: /v1/rerank, /rerank, /v1/info, /info
#
# You can use either backend names (recommended) or paths (auto-mapped)

backends:
  global_lock: true
  
  # If true, return 503 Service Unavailable when lock is busy
  # If false (default), block/wait until lock is available
  locked_error: false
  
  # Backend-based locking (recommended)
  # Each backend lists which OTHER backends it locks
  # When a backend runs, all backends in its 'locks' list are locked
  
  # LLM backend locks embeddings and reranker
  llm:
    locks:
      - embed
      - rerank
  
  # Embeddings backend locks LLM and reranker
  embed:
    locks:
      - llm
      - rerank
  
  # Reranker backend locks LLM and embeddings
  rerank:
    locks:
      - llm
      - embed
  
  # Note: backends don't lock themselves - only OTHER backends
  # This prevents deadlock and allows concurrent access to same backend
