# LLM Proxy configuration

# Global lock configuration (backend-based)
# Each backend lists which OTHER backends it should lock
# This ensures that when one backend runs, others cannot run simultaneously
backends:
  global_lock: true
  llm:
    locks:
      - embed
      - rerank
  embed:
    locks:
      - llm
      - rerank
  rerank:
    locks:
      - llm
      - embed

# Backend URLs
llm_base_url: "http://localhost:8080"
embed_base_url: "http://localhost:8081"
rerank_base_url: "http://localhost:8082"

# Request timeout in seconds
timeout: 300

# Enable debug logging
debug: true

# Rate limiting (requests per minute per IP)
rate_limit: 100

# CORS origins
cors_origins:
  - "*"
